name: Deploy AgileFlow

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Deploy Backend → Google Cloud Run
  # ──────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build & Push Docker Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/agileflow-backend:${{ github.sha }} ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/agileflow-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agileflow-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/agileflow-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            --set-env-vars "EMAIL_USER=${{ secrets.EMAIL_USER }}" \
            --set-env-vars "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" \
            --set-env-vars "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            --set-env-vars "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

  # ──────────────────────────────────────────────
  # JOB 2: Deploy Frontend → Firebase Hosting
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    # Wait for backend to deploy successfully first
    needs: deploy-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend
        env:
          # This ensures the production Cloud Run URL is baked into the build
          VITE_API_BASE_URL: https://agileflow-backend-768310526834.us-central1.run.app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: agileflow-56
          entryPoint: frontend
